name: Deploy to S3

on:
  push:
    branches: ["master", "main"]

concurrency:
  group: s3-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Optional (enable once your Karma config supports headless Chrome reliably in CI):
      # - name: Unit tests
      #   run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build (production)
        run: npx ng build --configuration production

      - name: Resolve build output directory
        id: builddir
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "dist/my-portfolio/browser" ]]; then
            echo "dir=dist/my-portfolio/browser" >> "$GITHUB_OUTPUT"
          else
            echo "dir=dist/my-portfolio" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync "${{ steps.builddir.outputs.dir }}" s3://${{ secrets.S3_BUCKET }} --delete

      # Helps avoid “stale app shell” after deploy if a CDN/browser caches index.html.
      - name: Set no-cache on index.html
        run: aws s3 cp "${{ steps.builddir.outputs.dir }}/index.html" s3://${{ secrets.S3_BUCKET }}/index.html --cache-control "no-cache" --content-type "text/html" --metadata-directive REPLACE
