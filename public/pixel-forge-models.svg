<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="PixelForge data models diagram">
  <defs>
    <style>
      .title { font: 700 24px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #111; }
      .subtitle { font: 400 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #444; }
      .box { fill: #fff; stroke: #222; stroke-width: 2; }
      .box-title { font: 700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #111; }
      .box-text { font: 400 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #111; }
      .note { font: 400 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #555; }
      .arrow { stroke: #222; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
      .arrow-label { font: 600 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #222; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222" />
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="48" class="title">PixelForge — Data/API Models</text>
  <text x="40" y="72" class="subtitle">Derived from Angular frontend and Flask backend implementation (Steam OpenID + session + profile fetch)</text>

  <!-- Frontend models -->
  <rect x="40" y="120" width="360" height="140" rx="10" class="box" />
  <text x="60" y="150" class="box-title">EnvironmentConfig (Angular)</text>
  <text x="60" y="176" class="box-text">backendUrl: string</text>
  <text x="60" y="206" class="note">Used to target the deployed Flask API</text>

  <rect x="40" y="290" width="360" height="180" rx="10" class="box" />
  <text x="60" y="320" class="box-title">LandingPageViewModel (Angular)</text>
  <text x="60" y="346" class="box-text">steamid: string | null</text>
  <text x="60" y="368" class="box-text">profile: SteamProfile | null</text>
  <text x="60" y="390" class="box-text">loading: boolean</text>
  <text x="60" y="420" class="note">Backed by /auth/me and /steam/profile</text>

  <!-- Backend/session models -->
  <rect x="460" y="120" width="360" height="140" rx="10" class="box" />
  <text x="480" y="150" class="box-title">Session (Flask server-side)</text>
  <text x="480" y="176" class="box-text">steamid: string</text>
  <text x="480" y="206" class="note">Stored in signed cookie session; configured as</text>
  <text x="480" y="226" class="box-text">SameSite=None, Secure, HttpOnly</text>

  <!-- Request/response models -->
  <rect x="880" y="120" width="360" height="200" rx="10" class="box" />
  <text x="900" y="150" class="box-title">OpenIDVerifyRequest</text>
  <text x="900" y="176" class="box-text">openid.ns: string</text>
  <text x="900" y="198" class="box-text">openid.mode: string</text>
  <text x="900" y="220" class="box-text">openid.claimed_id: string</text>
  <text x="900" y="242" class="box-text">openid.identity: string</text>
  <text x="900" y="264" class="box-text">openid.sig: string</text>
  <text x="900" y="286" class="box-text">openid.signed: string</text>
  <text x="900" y="308" class="note">Sent by Steam redirect (GET) or by frontend (POST /auth/steam/verify)</text>

  <rect x="880" y="350" width="360" height="110" rx="10" class="box" />
  <text x="900" y="380" class="box-title">AuthMeResponse</text>
  <text x="900" y="406" class="box-text">steamid: string</text>
  <text x="900" y="428" class="box-text">authenticated: true</text>

  <rect x="460" y="290" width="360" height="210" rx="10" class="box" />
  <text x="480" y="320" class="box-title">SteamProfile</text>
  <text x="480" y="346" class="box-text">steamid: string</text>
  <text x="480" y="368" class="box-text">personaname: string</text>
  <text x="480" y="390" class="box-text">profileurl: string</text>
  <text x="480" y="412" class="box-text">avatar: string</text>
  <text x="480" y="434" class="box-text">avatarmedium: string</text>
  <text x="480" y="456" class="box-text">avatarfull: string</text>
  <text x="480" y="478" class="box-text">personastate: number</text>
  <text x="480" y="500" class="box-text">communityvisibilitystate: number</text>

  <!-- Arrows / relationships -->
  <!-- Env -> LandingPage -->
  <path d="M 400 190 L 460 190" class="arrow" />
  <text x="412" y="180" class="arrow-label">configures</text>

  <!-- OpenID verify -> Session -->
  <path d="M 880 220 L 820 220" class="arrow" />
  <text x="836" y="210" class="arrow-label">verified by Steam → sets</text>

  <!-- Session -> AuthMeResponse -->
  <path d="M 640 260 L 640 350 L 880 405" class="arrow" />
  <text x="700" y="330" class="arrow-label">/auth/me reads</text>

  <!-- Session -> SteamProfile -->
  <path d="M 640 260 L 640 290" class="arrow" />
  <text x="660" y="280" class="arrow-label">/steam/profile uses</text>

  <!-- SteamProfile -> LandingPage -->
  <path d="M 460 395 L 400 395" class="arrow" />
  <text x="412" y="385" class="arrow-label">returned to UI</text>

  <!-- AuthMeResponse -> LandingPage -->
  <path d="M 880 410 L 400 410" class="arrow" />
  <text x="620" y="400" class="arrow-label">drives steamid state</text>

  <!-- Footnote -->
  <text x="40" y="680" class="note">Note: PixelForge currently models authentication/session + Steam profile retrieval; game library/stats/friends are presented as UI roadmap items.</text>
</svg>
