<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: 600 16px Arial, Helvetica, sans-serif; fill: #333; }
      .box { fill: #fff; stroke: #111; stroke-width: 2; }
      .boxTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #111; }
      .field { font: 14px Arial, Helvetica, sans-serif; fill: #111; }
      .muted { font: 13px Arial, Helvetica, sans-serif; fill: #444; }
      .line { stroke: #111; stroke-width: 2; fill: none; }
      .note { font: 12px Arial, Helvetica, sans-serif; fill: #555; }
    </style>
  </defs>

  <text x="40" y="60" class="title">DrivingEd Data Model (Wireframe)</text>
  <text x="40" y="90" class="subtitle">Entities and relationships inferred from EF Core models (User, Appointment)</text>

  <!-- User entity -->
  <rect x="60" y="140" width="560" height="640" rx="8" class="box"/>
  <text x="85" y="180" class="boxTitle">User</text>
  <text x="85" y="210" class="muted">Table: Users</text>

  <!-- User fields -->
  <text x="85" y="255" class="field">Id (int) [PK]</text>
  <text x="85" y="280" class="field">UserName (string)</text>
  <text x="85" y="305" class="field">FirstName (string)</text>
  <text x="85" y="330" class="field">LastName (string)</text>
  <text x="85" y="355" class="field">Email (string)</text>
  <text x="85" y="380" class="field">Password (string)</text>
  <text x="85" y="405" class="field">PhoneNumber (string)</text>
  <text x="85" y="430" class="field">Role (UserRole enum: Admin/Instructor/Student)</text>

  <text x="85" y="470" class="muted">Optional profile / instructor / student details</text>
  <text x="85" y="495" class="field">Privileges (List&lt;string&gt;?)</text>
  <text x="85" y="520" class="field">Expertise (string?)</text>
  <text x="85" y="545" class="field">Availability (string?)</text>
  <text x="85" y="570" class="field">LicenseNumber (string?)</text>
  <text x="85" y="595" class="field">VehicleDetails (string?)</text>
  <text x="85" y="620" class="field">ProfilePictureUrl (string?)</text>
  <text x="85" y="645" class="field">Bio (string?)</text>
  <text x="85" y="670" class="field">Address (string?)</text>
  <text x="85" y="695" class="field">DateOfBirth (DateTime?)</text>
  <text x="85" y="720" class="field">EmergencyContactName (string?)</text>
  <text x="85" y="745" class="field">EmergencyContactPhone (string?)</text>
  <text x="85" y="770" class="field">IsEnrolled (bool?)</text>
  <text x="85" y="795" class="field">EnrollmentDate (DateTime?)</text>

  <!-- Appointment entity -->
  <rect x="780" y="200" width="560" height="520" rx="8" class="box"/>
  <text x="805" y="240" class="boxTitle">Appointment</text>
  <text x="805" y="270" class="muted">Table: Appointments</text>

  <text x="805" y="315" class="field">Id (int) [PK]</text>
  <text x="805" y="340" class="field">InstructorId (int) [FK -&gt; User.Id]</text>
  <text x="805" y="365" class="field">StudentId (int) [FK -&gt; User.Id]</text>
  <text x="805" y="390" class="field">DateTime (DateTime)</text>
  <text x="805" y="415" class="field">Time (TimeSpan)</text>
  <text x="805" y="440" class="field">Location (string)</text>
  <text x="805" y="465" class="field">Notes (string)</text>
  <text x="805" y="490" class="field">Status (AppointmentStatus enum)</text>
  <text x="805" y="515" class="field">IsCancelled (bool)</text>
  <text x="805" y="555" class="muted">Navigation properties (loaded via Include)</text>
  <text x="805" y="580" class="field">Instructor (User?)</text>
  <text x="805" y="605" class="field">Student (User?)</text>

  <!-- Relationship lines -->
  <!-- InstructorId -> User -->
  <path class="line" d="M 780 355 C 720 355, 690 330, 620 330"/>
  <text x="640" y="320" class="note">many appointments</text>

  <!-- StudentId -> User -->
  <path class="line" d="M 780 380 C 715 380, 700 430, 620 430"/>
  <text x="640" y="420" class="note">many appointments</text>

  <!-- Notes -->
  <text x="40" y="860" class="note">Notes: The DbContext config prevents cascade deletes for InstructorId and StudentId (DeleteBehavior.Restrict). Seed data populates sample Admin/Instructor/Student users.</text>
</svg>
