<main class="page">
  <section class="prose hero">
    <p class="kicker">Let’s connect</p>
    <h1>Contact</h1>
    <p class="lead">The fastest ways to reach me.</p>
  </section>

  <section class="prose section" aria-label="Contact methods">
    <div class="contact-grid">
      <a
        class="contact-item"
        href="mailto:iluisflores@yahoo.com"
        aria-label="Email"
        title="iluisflores@yahoo.com"
      >
        <div class="contact-icon" aria-hidden="true">
          <mat-icon>mail</mat-icon>
        </div>
        <div class="contact-body">
          <p class="contact-label">Email</p>
          <span class="contact-link">iluisflores&#64;yahoo.com</span>
        </div>
      </a>

      <a
        class="contact-item"
        href="https://www.linkedin.com/in/luis-flores-estrada/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <div class="contact-icon" aria-hidden="true">
          <mat-icon>work</mat-icon>
        </div>
        <div class="contact-body">
          <p class="contact-label">LinkedIn</p>
          <span class="contact-link">View profile</span>
        </div>
      </a>

      <a
        class="contact-item"
        href="https://github.com/luisflores09"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub"
      >
        <div class="contact-icon" aria-hidden="true">
          <mat-icon>code</mat-icon>
        </div>
        <div class="contact-body">
          <p class="contact-label">GitHub</p>
          <span class="contact-link">View repositories</span>
        </div>
      </a>
    </div>
  </section>

  <section class="prose section" aria-label="Resume">
    <div class="resumeCard">
      <h2>Résumé</h2>
      <p class="resumeCard__lead">
        Download a PDF copy of my résumé, or open it in a new tab.
      </p>
      <div class="resumeCard__actions">
        <a
          mat-flat-button
          color="primary"
          href="/Luis%20Flores%20Resume%20Full%20Stack%20Software%20Engineer.pdf"
          download
          aria-label="Download resume PDF"
        >
          <mat-icon aria-hidden="true">download</mat-icon>
          Download PDF
        </a>
        <a
          mat-stroked-button
          href="/Luis%20Flores%20Resume%20Full%20Stack%20Software%20Engineer.pdf"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View resume PDF"
        >
          View
        </a>
      </div>
    </div>
  </section>
</main>
